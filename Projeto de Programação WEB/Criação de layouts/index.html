<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Layouts Organizados</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  padding:40px;
  background:#f5f5f5;
}

h2{
  margin-bottom:15px;
}

section{
  margin-bottom:60px;
  padding:20px;
  background:white;
  border-radius:10px;
}

img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:6px;
}

.box{
  border:2px solid #333;
}

/* ===================== */
/* LAYOUT 1 */
/* ===================== */
.layout1{
  display:flex;
  gap:20px;
  height:300px;
}

.layout1 div{
  flex:1;
}

/* ===================== */
/* LAYOUT 2 */
/* ===================== */
.layout2{
  display:flex;
  gap:20px;
  height:300px;
}

.layout2 .left{flex:2;}
.layout2 .right{flex:1;}

/* ===================== */
/* LAYOUT 3 */
/* ===================== */
.layout3{
  display:flex;
  flex-direction:column;
  gap:10px;
  height:350px;
}

.layout3 header{
  height:70px;
}

.layout3 main{
  flex:1;
}

/* ===================== */
/* LAYOUT 4 */
/* ===================== */
.layout4{
  display:flex;
  gap:15px;
}

.layout4 .card{
  flex:1;
  height:160px;
}

/* ===================== */
/* LAYOUT 5 */
/* ===================== */
.layout5{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.news{
  display:flex;
  gap:20px;
  padding:30px;
  min-height:180px;
  align-items:flex-start;
}

.news .text{
  flex:1;
  background:#ddd;
  padding:15px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

.news .img{
  width:150px;
  height:100px;
}

.news .text{
  flex:1;
  background:#ddd;
}

/* ===================== */
/* LAYOUT 6 */
/* ===================== */
.layout6{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:15px;
}

.layout6 .card{
  height:140px;
}

</style>
</head>

<body>

<!-- LAYOUT 1 -->
<section>
  <h2>Layout 1 - Tela dividida</h2>
  <div class="layout1">
    <div class="box">
      <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
    </div>
    <div class="box">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
    </div>
  </div>
</section>

<!-- LAYOUT 2 -->
<section>
  <h2>Layout 2 - Assimétrico</h2>
  <div class="layout2">
    <div class="left box">
      <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c">
    </div>
    <div class="right box">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
    </div>
  </div>
</section>

<!-- LAYOUT 3 -->
<section>
  <h2>Layout 3 - Tela cheia</h2>
  <div class="layout3">
    <header class="box">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
    </header>
    <main class="box">
      <img src="https://images.unsplash.com/photo-1484417894907-623942c8ee29">
    </main>
  </div>
</section>

<!-- LAYOUT 4 -->
<section>
  <h2>Layout 4 - Cards lado a lado</h2>
  <div class="layout4">
    <div class="card box"><img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f"></div>
    <div class="card box"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"></div>
    <div class="card box"><img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7"></div>
    <div class="card box"><img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f"></div>
  </div>
</section>

<!-- LAYOUT 5 -->
<section>
  <h2>Layout 5 - Notícias</h2>
  <div class="layout5">

    <div class="news box">
      <div class="img box">
        <img src="https://images.unsplash.com/photo-1504711434969-e33886168f5c">
      </div>
      <div class="text"></div>
    </div>

    <div class="news box">
      <div class="img box">
        <img src="https://images.unsplash.com/photo-1529070538774-1843cb3265df">
      </div>
      <div class="text"></div>
    </div>

    <div class="news box">
      <div class="img box">
        <img src="https://images.unsplash.com/photo-1495020689067-958852a7765e">
      </div>
      <div class="text"></div>
    </div>

  </div>
</section>

<!-- LAYOUT 6 -->
<section>
  <h2>Layout 6 - Grid de cards</h2>
  <div class="layout6">
    <div class="card box"><img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7"></div>
    <div class="card box"><img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f"></div>
    <div class="card box"><img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c"></div>
    <div class="card box"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb"></div>
    <div class="card box"><img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f"></div>
    <div class="card box"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"></div>
    <div class="card box"><img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085"></div>
    <div class="card box"><img src="https://images.unsplash.com/photo-1484417894907-623942c8ee29"></div>
  </div>
</section>

</body>
</html>
